<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="50%" x2="100%" y2="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Outer Ring (Rx is large enough for stadium shape) -->
  <rect x="10" y="25" width="80" height="50" rx="25" ry="25" fill="none" stroke="url(#grad)" stroke-width="8" />
  
  <!-- Inner Pill -->
  <!-- Center: x=30, y=38, width=40, height=24 -->
  <rect x="30" y="38" width="40" height="24" rx="12" ry="12" fill="url(#grad)" />
</svg>
